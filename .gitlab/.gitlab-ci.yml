stages:
    - lint
    - test
    - build
    - deploy

cache:
    key:
        files:
            - package-lock.json
    paths:
        - .npm
    policy: pull-push

before_script:
    - npm ci --cache .npm --prefer-offline

lint:eslint:
    stage: lint
    image: node:20-alpine
    script:
        - npm run lint
    artifacts:
        when: always
        reports:
            codequality: gl-codequality.json
        expire_in: 1 hour

test:vitest:
    stage: test
    image: node:20-alpine
    script:
        - npm run test
    artifacts:
        when: always
        reports:
            junit: vitest.xml
        expire_in: 1 hour

build:node:
    stage: build
    image: node:20-alpine
    script:
        - npm run build
    artifacts:
        paths:
            - dist/
        expire_in: 1 hour
    dependencies: []

deploy:pages:
    stage: deploy
    image: alpine:3
    rules:
        - if: $CI_COMMIT_TAG
          when: on_success
        - if: $CI_COMMIT_BRANCH
          when: manual
    pages:
        publish: dist
    before_script: []
    script:
        - echo 'Deploy to GitLab Pages'
    artifacts:
        expire_in: 1 hour
    dependencies:
        - build:node
    allow_failure: false